<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logs — Klan Nostrad</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div id="shell"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="../js/firebase-config.js"></script>
<script src="../js/app.js"></script>
<script>
let SESSION, STOCK = {}, PARSED = [];

function renderContent() {
  document.getElementById("content").innerHTML = `
    <h1>Logs</h1>
    <div class="sigil-rule"></div>
    <p class="muted small">Colle ici les logs du bot Discord. Format attendu, une ligne par mouvement :<br>
    <span class="mono">Prénom Nom a retiré 5x Nom du produit</span> ou <span class="mono">Prénom Nom a déposé 5x Nom du produit</span></p>

    <div class="panel mt16">
      <textarea id="rawLogs" rows="8" placeholder="Colle les logs ici…"></textarea>
      <button class="btn btn-primary mt16" onclick="parserLogs()">Analyser</button>
    </div>

    <div class="panel" id="previewPanel" style="display:none;">
      <div class="panel-head"><h2>Aperçu avant application</h2></div>
      <table><thead><tr><th>Membre</th><th>Mouvement</th><th>Qté</th><th>Produit</th><th>Correspondance stock</th></tr></thead>
        <tbody id="tblPreview"></tbody></table>
      <button class="btn btn-gold mt16" onclick="appliquerLogs()">Appliquer au stock</button>
    </div>

    <div class="panel">
      <div class="panel-head"><h2>Journal des mouvements de stock</h2></div>
      <table><thead><tr><th>Date</th><th>Membre</th><th>Action</th><th>Qté</th><th>Produit</th></tr></thead>
        <tbody id="tblJournal"><tr class="empty-row"><td colspan="5">Chargement…</td></tr></tbody></table>
    </div>
  `;
}

function trouverProduit(nomCherche) {
  for (const [catId, cat] of entries(STOCK)) {
    for (const [pid, p] of entries(cat.produits)) {
      if (p.nom.toLowerCase().trim() === nomCherche.toLowerCase().trim()) return { catId, pid, p };
    }
  }
  return null;
}

function parserLogs() {
  const raw = document.getElementById("rawLogs").value;
  const lignes = raw.split("\n").map(l => l.trim()).filter(Boolean);
  const re = /^(.+?)\s+a\s+(retiré|déposé)\s+(\d+)x?\s+(.+)$/i;
  PARSED = [];
  lignes.forEach(l => {
    const m = l.match(re);
    if (!m) return;
    const [, membre, sens, qte, produit] = m;
    const match = trouverProduit(produit);
    PARSED.push({ membre, sens: sens.toLowerCase(), qte: Number(qte), produit, match });
  });
  document.getElementById("previewPanel").style.display = PARSED.length ? "block" : "none";
  document.getElementById("tblPreview").innerHTML = PARSED.length ? PARSED.map(p => `
    <tr><td>${p.membre}</td><td>${p.sens === 'retiré' ? '↘ Retrait' : '↗ Dépôt'}</td><td>${p.qte}</td><td>${p.produit}</td>
    <td>${p.match ? '<span class="badge badge-ok">Trouvé</span>' : '<span class="badge badge-fail">Introuvable</span>'}</td></tr>
  `).join("") : "";
  if (!PARSED.length) toast("Aucune ligne reconnue.", true);
}

async function appliquerLogs() {
  let applied = 0;
  for (const p of PARSED) {
    if (!p.match) continue;
    const ref = db.ref(`stock/${p.match.catId}/produits/${p.match.pid}/stock`);
    const snap = await ref.once("value");
    const current = Number(snap.val()) || 0;
    const next = p.sens === "retiré" ? Math.max(0, current - p.qte) : current + p.qte;
    await ref.set(next);
    await db.ref("journal_stock/" + uid()).set({
      date: todayISO(), membre: p.membre, action: p.sens === "retiré" ? "Retrait (log)" : "Dépôt (log)",
      quantite: p.qte, produit: p.match.p.nom, createdAt: Date.now()
    });
    applied++;
  }
  toast(applied + " mouvement(s) appliqué(s).");
  document.getElementById("rawLogs").value = "";
  document.getElementById("previewPanel").style.display = "none";
  PARSED = [];
  await chargerJournal();
}

async function chargerJournal() {
  const snap = await db.ref("journal_stock").once("value");
  const list = entries(snap.val()).map(([id, j]) => j).sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0)).slice(0, 50);
  document.getElementById("tblJournal").innerHTML = list.length ? list.map(j => `
    <tr><td>${j.date}</td><td>${j.membre}</td><td>${j.action}</td><td>${j.quantite}</td><td>${j.produit}</td></tr>
  `).join("") : '<tr class="empty-row"><td colspan="5">Aucun mouvement</td></tr>';
}

(async function () {
  SESSION = await initShell("logs", "Logs");
  if (!SESSION) return;
  renderContent();
  const snapS = await db.ref("stock").once("value");
  STOCK = snapS.val() || {};
  await chargerJournal();
})();
</script>
</body>
</html>
