<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stats — Klan Nostrad</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div id="shell"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="../js/firebase-config.js"></script>
<script src="../js/app.js"></script>
<script>
let SESSION;

function renderContent() {
  document.getElementById("content").innerHTML = `
    <h1>Stats</h1>
    <div class="sigil-rule"></div>

    <div class="grid cols-3 mt16">
      <div class="card"><h3>Actions — total</h3><div class="stat-num" id="totalActions">0</div></div>
      <div class="card"><h3>Gains totaux</h3><div class="stat-num gold" id="totalGains">0 $</div></div>
      <div class="card"><h3>Taux de réussite</h3><div class="stat-num" id="tauxReussite">0%</div></div>
    </div>

    <div class="panel mt24">
      <div class="panel-head"><h2>Classement membres (toutes semaines)</h2></div>
      <table><thead><tr><th>#</th><th>Membre</th><th>Actions</th><th>Réussites</th><th>Gains générés</th></tr></thead>
        <tbody id="tblClassement"><tr class="empty-row"><td colspan="5">Chargement…</td></tr></tbody></table>
    </div>

    <div class="panel">
      <div class="panel-head"><h2>Détail par semaine</h2></div>
      <table><thead><tr><th>Semaine</th><th>Actions</th><th>Gains sale</th><th>Gains propre</th></tr></thead>
        <tbody id="tblSemaines"><tr class="empty-row"><td colspan="4">Chargement…</td></tr></tbody></table>
    </div>
  `;
}

async function chargerStats() {
  const [snapSem, snapAct] = await Promise.all([db.ref("semaines").once("value"), db.ref("actions").once("value")]);
  const semaines = entries(snapSem.val()).map(([id, s]) => ({ id, ...s }));
  const actionsParSemaine = snapAct.val() || {};

  let allActions = [];
  semaines.forEach(s => { allActions = allActions.concat(entries(actionsParSemaine[s.id]).map(([id, a]) => ({ ...a, semaineId: s.id }))); });

  document.getElementById("totalActions").textContent = allActions.length;
  const totalGains = allActions.reduce((acc, a) => acc + Number(a.gains_totaux || 0), 0);
  document.getElementById("totalGains").textContent = formatMoney(totalGains);
  const reussites = allActions.filter(a => a.resultat === "Réussite").length;
  document.getElementById("tauxReussite").textContent = allActions.length ? Math.round(reussites / allActions.length * 100) + "%" : "0%";

  const parMembre = {};
  allActions.forEach(a => {
    const key = a.prenom_membre || "?";
    if (!parMembre[key]) parMembre[key] = { actions: 0, reussites: 0, gains: 0 };
    parMembre[key].actions++;
    if (a.resultat === "Réussite") parMembre[key].reussites++;
    parMembre[key].gains += Number(a.gains_totaux || 0);
  });
  const classement = Object.entries(parMembre).sort((a, b) => b[1].gains - a[1].gains);
  document.getElementById("tblClassement").innerHTML = classement.length ? classement.map(([nom, d], i) => `
    <tr><td>${i + 1}</td><td>${nom}</td><td>${d.actions}</td><td>${d.reussites}</td><td>${formatMoney(d.gains)}</td></tr>
  `).join("") : '<tr class="empty-row"><td colspan="5">Aucune donnée encore</td></tr>';

  const lignesSemaines = semaines.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0)).map(s => {
    const acts = entries(actionsParSemaine[s.id]).map(([id, a]) => a);
    const gSale = acts.reduce((acc, a) => acc + Number(a.argent_sale || 0), 0);
    const gPropre = acts.reduce((acc, a) => acc + Number(a.argent_propre || 0), 0);
    return `<tr><td>${s.nom}</td><td>${acts.length}</td><td>${formatMoney(gSale)}</td><td>${formatMoney(gPropre)}</td></tr>`;
  });
  document.getElementById("tblSemaines").innerHTML = lignesSemaines.length ? lignesSemaines.join("") : '<tr class="empty-row"><td colspan="4">Aucune semaine</td></tr>';
}

(async function () {
  SESSION = await initShell("stats", "Stats");
  if (!SESSION) return;
  renderContent();
  await chargerStats();
})();
</script>
</body>
</html>
