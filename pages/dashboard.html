<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Klan Nostrad</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div id="shell"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="../js/firebase-config.js"></script>
<script src="../js/app.js"></script>
<script>
let SESSION, ACTIVE_WEEK_ID = null, ACTIVE_WEEK_NOM = "—";
let lastActionCount = null;

async function getActiveWeek() {
  const snap = await db.ref("semaines").once("value");
  const list = entries(snap.val()).map(([id, s]) => ({ id, ...s }));
  list.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
  const active = list.find(s => s.bloquee !== true) || list[0];
  return active || null;
}

function renderContent() {
  document.getElementById("content").innerHTML = `
    <h1>Dashboard</h1>
    <div class="sigil-rule"></div>
    <p class="muted small" id="weekLabel">Semaine active : —</p>

    <div class="grid cols-4 mt16">
      <div class="card"><h3>Solde sale</h3><div class="stat-num" id="soldeSale">0 $</div><div class="stat-sub">argent non blanchi</div></div>
      <div class="card"><h3>Solde propre</h3><div class="stat-num gold" id="soldePropre">0 $</div><div class="stat-sub">argent blanchi</div></div>
      <div class="card"><h3>Actions — semaine</h3><div class="stat-num" id="nbActions">0</div><div class="stat-sub" id="nbReussites">0 réussites</div></div>
      <div class="card"><h3>Gains totaux — semaine</h3><div class="stat-num gold" id="gainsTotaux">0 $</div><div class="stat-sub">sale + propre</div></div>
    </div>

    <div class="grid cols-2 mt24">
      <div class="panel">
        <div class="panel-head"><h2>⚠ Ruptures de stock</h2></div>
        <table><thead><tr><th>Produit</th><th>Stock</th><th>Seuil</th></tr></thead>
          <tbody id="tblRuptures"><tr class="empty-row"><td colspan="3">Chargement…</td></tr></tbody></table>
      </div>
      <div class="panel">
        <div class="panel-head"><h2>🎯 Quotas non atteints (aujourd'hui)</h2></div>
        <table><thead><tr><th>Membre</th><th>Quota</th><th>Réalisé</th></tr></thead>
          <tbody id="tblQuotas"><tr class="empty-row"><td colspan="3">Chargement…</td></tr></tbody></table>
      </div>
    </div>
  `;
}

async function refreshDashboard() {
  const week = await getActiveWeek();
  ACTIVE_WEEK_ID = week ? week.id : null;
  ACTIVE_WEEK_NOM = week ? week.nom : "Aucune semaine";
  document.getElementById("weekLabel").textContent = "Semaine active : " + ACTIVE_WEEK_NOM + (week && week.bloquee ? " (bloquée)" : "");

  // soldes
  const [snapSale, snapPropre] = await Promise.all([
    db.ref("argent/sale").once("value"),
    db.ref("argent/propre").once("value")
  ]);
  const calcSolde = (val) => entries(val).reduce((acc, [, l]) => acc + (l.type === "Sortie" ? -Number(l.montant || 0) : Number(l.montant || 0)), 0);
  document.getElementById("soldeSale").textContent = formatMoney(calcSolde(snapSale.val()));
  document.getElementById("soldePropre").textContent = formatMoney(calcSolde(snapPropre.val()));

  // actions semaine active
  let actions = [];
  if (ACTIVE_WEEK_ID) {
    const snapA = await db.ref("actions/" + ACTIVE_WEEK_ID).once("value");
    actions = entries(snapA.val()).map(([id, a]) => ({ id, ...a }));
  }
  if (lastActionCount !== null && actions.length > lastActionCount) {
    toast("Nouvelle action enregistrée");
  }
  lastActionCount = actions.length;

  const reussites = actions.filter(a => a.resultat === "Réussite").length;
  const gains = actions.reduce((acc, a) => acc + Number(a.gains_totaux || 0), 0);
  document.getElementById("nbActions").textContent = actions.length;
  document.getElementById("nbReussites").textContent = reussites + " réussites";
  document.getElementById("gainsTotaux").textContent = formatMoney(gains);

  // ruptures de stock
  const snapStock = await db.ref("stock").once("value");
  const ruptures = [];
  entries(snapStock.val()).forEach(([catId, cat]) => {
    entries(cat.produits).forEach(([pid, p]) => {
      if (Number(p.stock) <= Number(p.seuil || 0)) ruptures.push(p);
    });
  });
  const tblR = document.getElementById("tblRuptures");
  tblR.innerHTML = ruptures.length
    ? ruptures.map(p => `<tr><td>${p.nom}</td><td>${p.stock}</td><td>${p.seuil || 0}</td></tr>`).join("")
    : '<tr class="empty-row"><td colspan="3">Aucune rupture — tout est configuré dans Admin → Stock</td></tr>';

  // quotas du jour
  const snapM = await db.ref("membres").once("value");
  const membres = entries(snapM.val()).map(([id, m]) => ({ id, ...m })).filter(m => Number(m.quota) > 0);
  const today = todayISO();
  const todayActions = actions.filter(a => (a.date || "").slice(0, 10) === today);
  const tblQ = document.getElementById("tblQuotas");
  const rows = membres.map(m => {
    const fait = todayActions.filter(a => a.membre_id === m.id).reduce((acc, a) => acc + Number(a.quantite || 0), 0);
    if (fait >= m.quota) return null;
    return `<tr><td>${m.prenom}</td><td>${m.quota}</td><td>${fait}</td></tr>`;
  }).filter(Boolean);
  tblQ.innerHTML = rows.length ? rows.join("") : '<tr class="empty-row"><td colspan="3">Aucun quota défini ou tous atteints</td></tr>';
}

(async function () {
  SESSION = await initShell("dashboard", "Dashboard");
  if (!SESSION) return;
  renderContent();
  await refreshDashboard();
  setInterval(refreshDashboard, 60000);
  db.ref("actions/" + (ACTIVE_WEEK_ID || "x")).on("value", () => {}); // no-op hook point for future live listeners
})();
</script>
</body>
</html>
