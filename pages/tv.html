<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mode TV — Klan Nostrad</title>
<link rel="stylesheet" href="../css/style.css">
<style>
  body{overflow:hidden;}
  .tv-wrap{padding:30px 40px; min-height:100vh; display:flex; flex-direction:column;}
  .tv-head{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px;}
  .tv-title{font-family:var(--font-display); font-size:30px; color:var(--steel); letter-spacing:.1em;}
  .tv-sub{font-family:var(--font-display); color:var(--gold); font-size:16px; letter-spacing:.08em;}
  .tv-grid{display:grid; grid-template-columns:1.1fr 1fr; gap:22px; flex:1; min-height:0;}
  .tv-panel{background:rgba(14,16,21,.7); border:1px solid var(--line); border-radius:12px; padding:20px; overflow:auto;}
  .tv-panel h2{font-size:13px; text-transform:uppercase; letter-spacing:.08em; color:var(--text-dim); margin-bottom:14px; font-family:var(--font-body);}
  .tv-row{display:flex; justify-content:space-between; padding:9px 0; border-bottom:1px solid rgba(176,196,222,.08); font-size:14px;}
  .ticker-wrap{background:rgba(176,196,222,.06); border-top:1px solid var(--line); border-bottom:1px solid var(--line); padding:10px 0; margin:14px 0; overflow:hidden; white-space:nowrap;}
  .ticker{display:inline-block; padding-left:100%; animation:ticker 28s linear infinite; font-size:13px; color:var(--steel); letter-spacing:.03em;}
  @keyframes ticker{0%{transform:translateX(0);} 100%{transform:translateX(-100%);}}
  .closebtn{position:fixed; top:16px; right:16px; opacity:.5;}
  .closebtn:hover{opacity:1;}
</style>
</head>
<body>
<a href="dashboard.html" class="btn btn-sm closebtn">✕ Quitter</a>
<div class="tv-wrap" id="tvWrap"><p class="muted">Chargement…</p></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="../js/firebase-config.js"></script>
<script src="../js/app.js"></script>
<script>
async function getActiveWeek() {
  const snap = await db.ref("semaines").once("value");
  const list = entries(snap.val()).map(([id, s]) => ({ id, ...s }));
  list.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
  return list.find(s => s.bloquee !== true) || list[0] || null;
}

function renderShell() {
  document.getElementById("tvWrap").innerHTML = `
    <div class="tv-head">
      <div class="tv-title">KLAN NOSTRAD</div>
      <div class="tv-sub" id="tvWeek">Semaine —</div>
    </div>
    <div class="sigil-rule"></div>
    <div class="ticker-wrap"><span class="ticker" id="tvTicker">Chargement…</span></div>
    <div class="tv-grid">
      <div class="tv-panel"><h2>🏆 Classement — semaine active</h2><div id="tvClassement"></div></div>
      <div class="tv-panel"><h2>📋 Actions récentes</h2><div id="tvRecentes"></div></div>
    </div>
    <div class="tv-grid mt16">
      <div class="tv-panel"><h2>⚠ Alertes stock</h2><div id="tvStock"></div></div>
      <div class="tv-panel"><h2>💰 Soldes</h2><div id="tvSoldes"></div></div>
    </div>
  `;
}

async function refreshTV() {
  const week = await getActiveWeek();
  document.getElementById("tvWeek").textContent = week ? week.nom : "Aucune semaine active";

  const snapA = week ? await db.ref("actions/" + week.id).once("value") : { val: () => null };
  const actions = entries(snapA.val()).map(([id, a]) => ({ id, ...a })).sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));

  const parMembre = {};
  actions.forEach(a => { parMembre[a.prenom_membre] = (parMembre[a.prenom_membre] || 0) + Number(a.gains_totaux || 0); });
  const classement = Object.entries(parMembre).sort((a, b) => b[1] - a[1]);
  document.getElementById("tvClassement").innerHTML = classement.length
    ? classement.map(([p, g], i) => `<div class="tv-row"><span>${i + 1}. ${p}</span><span style="color:var(--gold)">${formatMoney(g)}</span></div>`).join("")
    : '<p class="muted small">Aucune donnée.</p>';

  document.getElementById("tvRecentes").innerHTML = actions.slice(0, 10).map(a =>
    `<div class="tv-row"><span>${a.prenom_membre} — ${a.action}</span><span class="${a.resultat === 'Réussite' ? '' : 'muted'}">${a.resultat}</span></div>`
  ).join("") || '<p class="muted small">Aucune action.</p>';

  const snapS = await db.ref("stock").once("value");
  const ruptures = [];
  entries(snapS.val()).forEach(([catId, cat]) => entries(cat.produits).forEach(([pid, p]) => { if (Number(p.stock) <= Number(p.seuil || 0)) ruptures.push(p); }));
  document.getElementById("tvStock").innerHTML = ruptures.length
    ? ruptures.map(p => `<div class="tv-row"><span>${p.nom}</span><span style="color:var(--danger)">${p.stock}</span></div>`).join("")
    : '<p class="muted small">Aucune rupture.</p>';

  const [snapSale, snapPropre] = await Promise.all([db.ref("argent/sale").once("value"), db.ref("argent/propre").once("value")]);
  const calc = v => entries(v).reduce((acc, [, l]) => acc + (l.type === "Sortie" ? -Number(l.montant || 0) : Number(l.montant || 0)), 0);
  document.getElementById("tvSoldes").innerHTML = `
    <div class="tv-row"><span>Sale</span><span>${formatMoney(calc(snapSale.val()))}</span></div>
    <div class="tv-row"><span>Propre</span><span style="color:var(--gold)">${formatMoney(calc(snapPropre.val()))}</span></div>`;

  document.getElementById("tvTicker").textContent =
    classement.length ? `🐆 KLAN NOSTRAD — ${classement[0][0]} en tête cette semaine — ${actions.length} actions enregistrées — ${ruptures.length} rupture(s) de stock` : "🐆 KLAN NOSTRAD — Bienvenue dans le mode TV";
}

(async function () {
  const session = requireSession();
  if (!session) return;
  const ok = await canAccess(session, "tv");
  if (!ok) { document.getElementById("tvWrap").innerHTML = '<p class="muted">Accès refusé à cette page.</p>'; return; }
  renderShell();
  await refreshTV();
  setInterval(refreshTV, 30000);
})();
</script>
</body>
</html>
